<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Darsliklar Platformasi{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-600">Darsliklar.uz</a>
            <div class="space-x-6 font-medium">
                <a href="{% url 'fanlar_list' %}" class="hover:text-blue-600 transition">Fanlar</a>
                <a href="{% url 'fanlar_list' %}" class="hover:text-blue-600 transition">Darsliklar</a>
                <a href="#" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Kirish</a>
            </div>
        </div>
    </nav>

    <!-- Asosiy Kontent -->
    <main class="container mx-auto px-6 py-8 min-h-[70vh]">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-300 text-center py-6 mt-12">
        <p>&copy; 2026 Darsliklar Platformasi</p>
    </footer>

</body>
</html>
