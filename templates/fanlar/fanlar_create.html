{% extends 'base.html' %}
{% block title %}Yangi fan qo'shish{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 p-8 bg-white rounded-2xl shadow-xl border border-gray-100">
    <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">
        ➕ Yangi fan qo'shish
    </h1>

    <form method="POST" enctype="multipart/form-data" class="space-y-5">
        {% csrf_token %}

        <!-- Formani avtomatik va chiroyli ko'rsatish -->
        <div class="space-y-4">
            {{ form.as_p }}
        </div>

        <div class="flex justify-end gap-4 mt-8 pt-4 border-t">
            <a href="{% url 'fanlar_list' %}"
               class="px-6 py-2.5 bg-gray-100 text-gray-700 rounded-xl hover:bg-gray-200 transition font-semibold">
               Bekor qilish
            </a>
            <button type="submit"
                    class="px-6 py-2.5 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-xl hover:shadow-lg transition font-semibold">
               Saqlash
            </button>
        </div>
    </form>
</div>
{% endblock %}
