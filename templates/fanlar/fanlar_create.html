{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto px-6 py-12">
    <div class="bg-white rounded-2xl border border-black/10 p-8">
        <h2 class="text-xl font-bold text-center mb-6">📚 Fan qo'shish</h2>
        <form method="post" enctype="multipart/form-data"
              class="space-y-4 [&_label]:block [&_label]:font-semibold [&_label]:mb-1 [&_input]:w-full [&_input]:border [&_input]:border-black/20 [&_input]:rounded-lg [&_input]:p-2.5 [&_input:focus]:border-black [&_input:focus]:outline-none [&_textarea]:w-full [&_textarea]:border [&_textarea]:border-black/20 [&_textarea]:rounded-lg [&_textarea]:p-2.5">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit"
                    class="w-full bg-black text-white py-3 rounded-lg font-semibold hover:bg-neutral-800 transition">
                Saqlash
            </button>
        </form>
    </div>
</div>
{% endblock %}
