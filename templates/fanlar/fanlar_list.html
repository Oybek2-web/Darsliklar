{% extends 'base.html' %}

{% block content %}
<div class="space-y-3">
    {% for fan in fanlar %}
    <div class="group bg-white rounded-xl border border-gray-200 p-5 hover:shadow-md hover:border-gray-300 transition-all duration-200">
        <div class="flex items-center justify-between">
            <div class="flex-1">
                <a href="{% url 'fanlar:darsliklar_kirish' fan.id %}" class="block">
                    <h3 class="text-lg font-semibold text-gray-900 group-hover:text-gray-700 transition">
                        {{ fan.nomi|default:"Nomsiz fan" }}
                    </h3>
                    {% if fan.price %}
                    <p class="text-sm text-gray-500 mt-1">{{ fan.price }} so'm</p>
                    {% endif %}
                </a>
            </div>

            <div class="flex gap-2 ml-4">
                <a href="{% url 'fanlar:fanlar_update' fan.id %}"
                   class="p-2 text-gray-400 hover:text-gray-700 hover:bg-gray-100 rounded-lg transition"
                   title="Tahrirlash">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                </a>
                <a href="{% url 'fanlar:fanlar_delete' fan.id %}"
                   class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition"
                   onclick="return confirm('Rostdan ham o\'chirmoqchimisiz?')"
                   title="O'chirish">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="text-center py-16 bg-white rounded-xl border border-gray-200 border-dashed">
        <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
        </svg>
        <p class="text-gray-500 text-lg font-medium">Hozircha fanlar yo'q</p>
        <p class="text-gray-400 text-sm mt-1">Yuqoridagi tugmani bosib birinchi fanni qo'shing</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
