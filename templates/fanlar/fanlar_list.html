{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto px-6 py-8 space-y-3">
    {% for fan in fanlar %}
    <div class="group bg-white rounded-xl border border-black/10 p-5 hover:border-black transition">
        <div class="flex items-center justify-between">
            <a href="{% url 'fanlar:darsliklar_kirish' fan.id %}" class="flex-1">
                <h3 class="text-lg font-semibold group-hover:underline">{{ fan.title|default:"Nomsiz fan" }}</h3>
                {% if fan.price %}<p class="text-sm text-neutral-500 mt-1">{{ fan.price }} so'm</p>{% endif %}
            </a>
            <div class="flex gap-2 ml-4">
                <a href="{% url 'fanlar:fanlar_update' fan.id %}"
                   class="p-2 text-neutral-400 hover:text-black hover:bg-neutral-100 rounded-lg transition"
                   title="Tahrirlash">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                </a>
                <a href="{% url 'fanlar:fanlar_delete' fan.id %}"
                   onclick="return confirm('Rostdan ham o\'chirmoqchimisiz?')"
                   class="p-2 text-neutral-400 hover:text-white hover:bg-black rounded-lg transition" title="O'chirish">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>
    {% empty %}
    <div class="text-center py-16 bg-white rounded-xl border border-dashed border-black/20">
        <p class="text-neutral-500 text-lg font-medium">Hozircha fanlar yo'q</p>
        <p class="text-neutral-400 text-sm mt-1">Yuqoridagi tugmani bosib birinchi fanni qo'shing</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
