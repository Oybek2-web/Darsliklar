{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Tizimga kirish</h3>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <!-- Xatoliklarni ko'rsatish -->
                    {% if form.errors %}
                        <div class="alert alert-danger">Foydalanuvchi nomi yoki parol xato!</div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label">Foydalanuvchi nomi</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Parol</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">Kirish</button>
                </form>

                <div class="text-center">
                    <a href="{% url 'accounts:forgot' %}" class="text-decoration-none">Parolni unutdingizmi?</a>
                    <hr>
                    <span>Hisobingiz yo'qmi? </span>
                    <a href="{% url 'accounts:register' %}" class="text-decoration-none">Ro'yxatdan o'ting</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
