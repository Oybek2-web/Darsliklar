{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Parolni tiklash</h3>
                <p class="text-muted text-center">Ro'yxatdan o'tgan emailingizni kiriting. Biz sizga tasdiqlash kodini (OTP) yuboramiz.</p>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Email manzil</label>
                        <input type="email" name="email" class="form-control" placeholder="sizning@email.com" required>
                    </div>

                    <button type="submit" class="btn btn-warning w-100">Kodni yuborish</button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'accounts:login' %}" class="text-decoration-none">Orqaga qaytish</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
