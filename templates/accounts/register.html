{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Ro'yxatdan o'tish</h3>
                
                <form method="POST">
                    {% csrf_token %}
                    
                    <!-- Form xatoliklarini ko'rsatish -->
                    {% if form.errors %}
                        <div class="alert alert-danger">
                            {% for field, errors in form.errors.items %}
                                {% for error in errors %}
                                    <p class="mb-0">{{ error }}</p>
                                {% endfor %}
                            {% endfor %}
                        </div>
                    {% endif %}

                    <!-- DIQQAT: Bu yerda form.as_p ishlatildi. Agar forms.py da maydon nomlari boshqacha bo'lsa, ularni moslashtiring -->
                    {{ form.as_p }}

                    <button type="submit" class="btn btn-success w-100 mt-3">Ro'yxatdan o'tish</button>
                </form>

                <div class="text-center mt-3">
                    <span>Hisobingiz bormi? </span>
                    <a href="{% url 'accounts:login' %}" class="text-decoration-none">Tizimga kiring</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
