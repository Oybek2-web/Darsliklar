{% extends 'base.html' %}

{% block title %}Yangi Darslik Qo'shish{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-lg p-8">
    <h1 class="text-3xl font-bold mb-6 text-gray-800">Yangi Darslik Qo'shish</h1>

    <form method="post" class="space-y-6">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Darslik nomi</label>
            <input type="text" name="title" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Fan</label>
            <select name="fan" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                <option value="">Fanni tanlang</option>
                {% for fan in fanlar %}
                <option value="{{ fan.id }}">{{ fan.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="flex gap-4">
            <button type="submit"
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                Saqlash
            </button>
            <a href="{% url 'darsliklar_list' %}"
               class="bg-gray-300 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-400 transition">
                Bekor qilish
            </a>
        </div>
    </form>
</div>
{% endblock %}
